<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Vinceslink Shop — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --royal: #0033CC;
  --dark:  #0F172A;
  --muted: #475569;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: #c8d4f5;
  overscroll-behavior: none;
}

/* ══ PAGE: full viewport, 3 rows ══ */
.page {
  height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══ NAVBAR ══ */
.navbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: rgba(255,255,255,0.40);
  backdrop-filter: blur(14px) saturate(160%);
  -webkit-backdrop-filter: blur(14px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,0.50);
  z-index: 10;
}

.nav-logo {
  display: flex; align-items: center; gap: 9px; text-decoration: none;
}
.nav-logo img {
  width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
}
.nav-logo-text {
  font-size: 17px; font-weight: 700; color: var(--royal); letter-spacing: -0.5px;
}
.nav-back {
  display: inline-flex; align-items: center; gap: 6px;
  text-decoration: none; font-size: 12px; font-weight: 600;
  color: var(--royal); background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px); border: 1px solid rgba(0,51,204,0.18);
  border-radius: 999px; padding: 6px 14px; transition: all 0.25s ease;
}
.nav-back:hover { background: rgba(255,255,255,0.85); }
.nav-back svg {
  width: 13px; height: 13px; stroke: var(--royal); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

/* ══ IMAGE ZONE ══
   Takes up the top portion of the screen.
   Background image lives here.
   Content is absolutely positioned on top.
══ */
.image-zone {
  flex: 1 1 0;
  position: relative;
  background-image: url('images/shop/images/IMG_0995.jpeg');
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  overflow: hidden;
  /* leave room for bottom-bar */
  max-height: 62vh;
}

/* TOP CONTENT — eyebrow, headline, subtext
   Sits in upper ~40% of image zone */
.top-content {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 20px 0;
  z-index: 2;
}

.eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.40); backdrop-filter: blur(8px);
  border: 1px solid rgba(0,51,204,0.18); border-radius: 999px;
  padding: 5px 14px; font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--royal); margin-bottom: 8px;
}
.eyebrow-dot {
  width: 5px; height: 5px; background: var(--royal);
  border-radius: 50%; animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.headline {
  text-align: center; line-height: 1.05; margin-bottom: 6px;
}
.headline-coming {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(28px, 7vw, 48px);
  font-weight: 700; color: var(--dark); letter-spacing: -2px;
}
.headline-soon {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 7vw, 48px);
  font-weight: 700; font-style: italic;
  color: var(--royal); letter-spacing: -1px; margin-left: 8px;
}

.subtext {
  font-size: 11.5px; color: var(--dark); text-align: center;
  line-height: 1.6; max-width: 290px;
  font-weight: 500;
  text-shadow: 0 1px 8px rgba(255,255,255,0.8);
}

/* COUNTDOWN OVERLAY — sits on the glass card in the image
   Card in IMG_0995 is at roughly 42%–72% from top of image,
   left edge ~8%, right edge ~68% of image width */
.countdown-overlay {
  position: absolute;
  /* vertical: top of card area */
  top: 42%;
  /* horizontal: centre of card (card is left 65% of image) */
  left: 0;
  width: 65%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2;
  padding: 0 8px;
}

.launching-label {
  font-size: 11px; font-weight: 700;
  color: var(--dark); text-align: center;
  margin-bottom: 6px;
  letter-spacing: 0.01em;
}

.countdown-digits {
  display: flex; align-items: center;
  justify-content: center; gap: 0;
}

.countdown-unit {
  display: flex; flex-direction: column;
  align-items: center;
  min-width: clamp(55px, 14vw, 80px);
}

.countdown-number {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(36px, 9vw, 60px);
  font-weight: 700; color: var(--dark);
  line-height: 1; letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}

.countdown-label {
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--royal); margin-top: 2px;
}

.countdown-sep {
  font-size: clamp(28px, 7vw, 48px);
  font-weight: 300; color: rgba(0,0,0,0.18);
  line-height: 1; padding-bottom: 14px; margin: 0 2px;
}

/* ══ BOTTOM BAR ══ */
.bottom-bar {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 20px 10px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(10px);
  gap: 10px;
}

.action-card {
  background: rgba(255,255,255,0.38);
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  border: 1px solid rgba(255,255,255,0.65);
  border-radius: 18px; padding: 12px 16px;
  width: 100%; max-width: 420px;
}

.action-top {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.cart-icon {
  width: 30px; height: 30px; background: rgba(0,51,204,0.10);
  border-radius: 9px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0;
}
.cart-icon svg {
  width: 15px; height: 15px; stroke: var(--royal); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
.action-text { font-size: 12px; color: var(--dark); line-height: 1.5; }
.action-text strong { color: var(--royal); }

.action-buttons { display: flex; gap: 10px; }

.browse-btn { flex: 1; position: relative; }
.browse-trigger {
  width: 100%; padding: 10px 12px;
  background: rgba(255,255,255,0.70);
  border: 1.5px solid rgba(0,51,204,0.18);
  border-radius: 11px; font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; color: var(--dark);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 6px; transition: all 0.25s ease;
}
.browse-trigger:hover { background: rgba(255,255,255,0.90); border-color: var(--royal); }
.browse-trigger svg { transition: transform 0.3s ease; }
.browse-trigger.open svg { transform: rotate(180deg); }

.browse-dropdown {
  display: none; position: absolute;
  bottom: calc(100% + 6px); left: 0; right: 0;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(0,51,204,0.12);
  border-radius: 11px; overflow: hidden;
  box-shadow: 0 -8px 24px rgba(0,51,204,0.10); z-index: 100;
}
.browse-dropdown.open { display: block; }
.browse-option {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px; text-decoration: none;
  font-size: 13px; font-weight: 500; color: var(--dark);
  transition: background 0.2s ease;
}
.browse-option:hover { background: rgba(0,51,204,0.06); color: var(--royal); }
.browse-option:not(:last-child) { border-bottom: 1px solid rgba(0,0,0,0.05); }

.whatsapp-btn {
  flex: 1.4; padding: 10px 12px; background: var(--royal);
  border: none; border-radius: 11px; font-size: 13px; font-weight: 700;
  font-family: 'DM Sans', sans-serif; color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-decoration: none; transition: all 0.25s ease;
  box-shadow: 0 4px 14px rgba(0,51,204,0.30);
}
.whatsapp-btn:hover { background: #0029a3; transform: translateY(-1px); }

.trust-badges {
  display: flex; align-items: center;
  justify-content: center; gap: 14px;
}
.trust-badge {
  display: flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 500; color: var(--muted);
}
.trust-badge svg {
  width: 12px; height: 12px; stroke: var(--royal); fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; opacity: 0.65;
}
.trust-sep { width: 1px; height: 11px; background: rgba(0,0,0,0.12); }

/* ══ SMALL PHONE ══ */
@media (max-width: 380px) {
  .countdown-number { font-size: 32px; }
  .countdown-unit   { min-width: 50px; }
  .subtext          { font-size: 11px; }
}
@media (max-height: 680px) {
  .subtext { display: none; }
  .image-zone { max-height: 55vh; }
}

<div class="page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="https://vinceslink.com" class="nav-logo">
      <img src="images/IMG_0509.jpeg" alt="Vinceslink Logo"/>
      <span class="nav-logo-text">vinceslink</span>
    </a>
    <a href="https://vinceslink.com" class="nav-back">
      <svg viewBox="0 0 13 13"><path d="M8 2L4 6.5 8 11"/></svg>
      Back to Vinceslink
    </a>
  </nav>

  <!-- IMAGE ZONE: bg image with overlaid content -->
  <div class="image-zone">

    <!-- TOP CONTENT: sits above the card in the image -->
    <div class="top-content">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        · E-Commerce ·
      </div>
      <div class="headline">
        <span class="headline-coming">Coming</span>
        <span class="headline-soon">Soon</span>
      </div>
      <p class="subtext">
        We are building an e-commerce where you can shop directly,
        pay online and get your goods delivered on your doorstep.
      </p>
    </div>

    <!-- COUNTDOWN: absolutely placed on the glass card -->
    <div class="countdown-overlay">
      <p class="launching-label">This feature is launching in</p>
      <div class="countdown-digits">
        <div class="countdown-unit">
          <div class="countdown-number" id="cd-days">000</div>
          <div class="countdown-label">Days</div>
        </div>
        <div class="countdown-sep">|</div>
        <div class="countdown-unit">
          <div class="countdown-number" id="cd-hours">00</div>
          <div class="countdown-label">Hrs</div>
        </div>
        <div class="countdown-sep">|</div>
        <div class="countdown-unit">
          <div class="countdown-number" id="cd-mins">00</div>
          <div class="countdown-label">Mins</div>
        </div>
      </div>
    </div>

  </div><!-- end .image-zone -->

  <!-- BOTTOM BAR: action card + trust badges -->
  <div class="bottom-bar">

    <div class="action-card">
      <div class="action-top">
        <div class="cart-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
        </div>
        <p class="action-text">
          For now browse our products and shop directly with us on <strong>WhatsApp</strong>.
        </p>
      </div>
      <div class="action-buttons">
        <div class="browse-btn" id="browseBtn">
          <button class="browse-trigger" id="browseTrigger" onclick="toggleBrowse()">
            Browse
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 4l4 4 4-4"/>
            </svg>
          </button>
          <div class="browse-dropdown" id="browseDropdown">
            <a href="https://vinceslink.com/gadget.html" class="browse-option">📱 Gadget Hub</a>
            <a href="https://vinceslink.com/superstore.html" class="browse-option">🛒 Super Store</a>
          </div>
        </div>
        <a href="https://wa.me/2349078683552" target="_blank" class="whatsapp-btn">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="white">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
          </svg>
          Shop on WhatsApp
        </a>
      </div>
    </div>

    <div class="trust-badges">
      <div class="trust-badge">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        100% Secure
      </div>
      <div class="trust-sep"></div>
      <div class="trust-badge">
        <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Fast Delivery
      </div>
      <div class="trust-sep"></div>
      <div class="trust-badge">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Trusted Quality
      </div>
    </div>

  </div><!-- end .bottom-bar -->

</div><!-- end .page -->

<script>
  // ── Countdown ─────────────────────────────────────
  const TARGET = new Date('2026-09-27T00:00:00').getTime();

  function updateCountdown() {
    const diff = TARGET - Date.now();
    if (diff <= 0) {
      document.getElementById('cd-days').textContent  = '000';
      document.getElementById('cd-hours').textContent = '00';
      document.getElementById('cd-mins').textContent  = '00';
      return;
    }
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000) / 60000);
    document.getElementById('cd-days').textContent  = String(days).padStart(3,'0');
    document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(mins).padStart(2,'0');
  }

  updateCountdown();
  setInterval(updateCountdown, 30000);

  // ── Browse dropdown ───────────────────────────────
  function toggleBrowse() {
    document.getElementById('browseTrigger').classList.toggle('open');
    document.getElementById('browseDropdown').classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    if (!document.getElementById('browseBtn').contains(e.target)) {
      document.getElementById('browseTrigger').classList.remove('open');
      document.getElementById('browseDropdown').classList.remove('open');
    }
  });

  // ── Block all scroll / rubber band ───────────────
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
</script>

</body>
</html>
