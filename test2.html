<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bento Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fef5cf;
      min-height: 100vh;
    }

    .gold { color: #c2891f; }

    /* ═══════════════════════════
       BENTO GRID WRAPPER
    ═══════════════════════════ */
    .bento-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ═══════════════════════════
       MOBILE
    ═══════════════════════════ */
    @media (max-width: 767px) {
      body {
        padding: 16px;
        display: flex;
        justify-content: center;
        background: #e0ddd8;
      }

      .bento-grid {
        gap: 12px;
      }

      .bento-grid__hero-section {
        position: relative;
        width: 100%;
        height: 224px;
        background: #fef5cf;
      }

      .mobile-hero-image {
        display: block;
        position: absolute;
        top: 0; right: 0;
        width: 75%;
        height: 100%;
        object-fit: cover;
        object-position: 30% top;
      }

      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          #fef5cf 0%,
          #fef5cf 25%,
          rgba(254,245,207,0.9) 38%,
          rgba(254,245,207,0.55) 52%,
          rgba(254,245,207,0.15) 68%,
          rgba(254,245,207,0.0) 82%
        );
        z-index: 1;
      }

      .hero-text {
        position: absolute;
        top: 0; left: 0;
        width: 68%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 22px 0 22px 22px;
        z-index: 2;
      }

      .hero-text h1 {
        font-size: 22px;
        font-weight: 900;
        line-height: 1.22;
        color: #141414;
        margin-bottom: 11px;
        letter-spacing: -0.5px;
      }

      .hero-text p {
        font-size: 12.5px;
        color: #3a3a3a;
        line-height: 1.65;
        max-width: 155px;
      }

      /* hide desktop elements */
      .desktop-hero-card { display: none; }
    }

    /* ═══════════════════════════
       DESKTOP
    ═══════════════════════════ */
    @media (min-width: 768px) {
      body {
        padding: 0 60px;
        background: #fef5cf;
        display: flex;
        align-items: center;
        min-height: 100vh;
      }

      .bento-grid {
        max-width: 1280px;
        width: 100%;
        margin: 0 auto;
        gap: 20px;
      }

      .bento-grid__hero-section {
        display: flex;
        align-items: center;
        gap: 40px;
        width: 100%;
        height: 380px;
      }

      /* hide mobile elements */
      .mobile-hero-image,
      .hero-overlay { display: none; }

      /* ── LEFT TEXT 43% ── */
      .hero-text {
        flex: 0 0 43%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
      }

      .hero-text h1 {
        font-size: 56px;
        font-weight: 900;
        line-height: 1.08;
        color: #141414;
        letter-spacing: -2px;
      }

      .hero-text p {
        font-size: 18px;
        font-weight: 400;
        color: #3a3a3a;
        line-height: 1.7;
        max-width: 400px;
      }

      /* ── RIGHT IMAGE CARD 57% ── */
      .desktop-hero-card {
        flex: 0 0 57%;
        position: relative;
        height: 100%;
        border-radius: 28px;
        overflow: hidden;
      }

      .desktop-hero-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* crop bottom — show from top, cuts around waist level */
        object-position: center 8%;
        display: block;
      }

      /* ── EDGE BLENDS — smooth all 4 sides into cream ── */
      .card-blend-left {
        position: absolute;
        top: 0; left: 0;
        width: 28%;
        height: 100%;
        background: linear-gradient(
          to right,
          #fef5cf 0%,
          rgba(254,245,207,0.75) 45%,
          rgba(254,245,207,0.0) 100%
        );
        z-index: 2;
      }

      .card-blend-right {
        position: absolute;
        top: 0; right: 0;
        width: 14%;
        height: 100%;
        background: linear-gradient(
          to left,
          rgba(254,245,207,0.6) 0%,
          rgba(254,245,207,0.0) 100%
        );
        z-index: 2;
      }

      .card-blend-top {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 22%;
        background: linear-gradient(
          to bottom,
          rgba(254,245,207,0.7) 0%,
          rgba(254,245,207,0.0) 100%
        );
        z-index: 2;
      }

      .card-blend-bottom {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 22%;
        background: linear-gradient(
          to top,
          rgba(254,245,207,0.65) 0%,
          rgba(254,245,207,0.0) 100%
        );
        z-index: 2;
      }

      /* ── FLOATING INFO CARD ── */
      .info-card {
        position: absolute;
        /* moved up — sits around vertical center */
        top: 50%;
        transform: translateY(-60%);
        left: 32px;
        z-index: 4;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 20px;
        padding: 20px 22px;
        max-width: 230px;
        /* clear glass — no heavy blur */
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      /* Star icon with rounded border */
      .info-card .star-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1.5px solid rgba(194, 137, 31, 0.5);
        background: rgba(255,255,255,0.25);
        margin-bottom: 12px;
      }

      .info-card .star-wrap svg {
        width: 20px;
        height: 20px;
        fill: #c2891f;
      }

      .info-card h3 {
        font-size: 17px;
        font-weight: 800;
        color: #141414;
        line-height: 1.3;
        margin-bottom: 8px;
      }

      .info-card p {
        font-size: 14px;
        color: #2a2a2a;
        line-height: 1.6;
        font-weight: 400;
      }
    }
  </style>
</head>
<body>

  <section class="bento-grid">

    <!-- ═══ HERO SECTION ═══ -->
    <div class="bento-grid__hero-section">

      <!-- MOBILE image + overlay -->
      <img
        class="mobile-hero-image"
        src="images/business/Superstore/IMG_1453.jpeg"
        alt="Boy holding VL shopping bag"
      />
      <div class="hero-overlay"></div>

      <!-- TEXT — shared, repositioned by breakpoint -->
      <div class="hero-text">
        <h1>Find What You Need<br>in <span class="gold">Seconds</span></h1>
        <p>From your kitchen to your bathroom cabinet, we've organized everything into easy-to-shop categories.</p>
      </div>

      <!-- DESKTOP image card -->
      <div class="desktop-hero-card">
        <img
          class="desktop-hero-img"
          src="images/business/Superstore/IMG_1453.jpeg"
          alt="Boy holding VL shopping bag"
        />

        <!-- Edge blends -->
        <div class="card-blend-left"></div>
        <div class="card-blend-right"></div>
        <div class="card-blend-top"></div>
        <div class="card-blend-bottom"></div>

        <!-- Floating glassmorphism info card -->
        <div class="info-card">
          <div class="star-wrap">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </div>
          <h3>Shop Smarter,<br>Live Better</h3>
          <p>Quality products, great prices &amp; everything you love in one place.</p>
        </div>

      </div>

    </div>

    <!-- bento-grid__row-1 coming next -->
    <!-- bento-grid__row-2 coming next -->

  </section>

</body>
</html>
